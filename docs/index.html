<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>WA DSHS Facilities Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="css/map.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <h1>WA DSHS Facilities Map</h1>
        <p>Pin color = assignee · Pin shape = facility subtype</p>
      </div>
      <div id="status">Loading…</div>
    </header>

    <aside class="sidebar">
      <section class="panel" id="filters-panel">
        <div class="panel-heading">
          <h2>Filters</h2>
          <button type="button" id="clear-filters" class="text-button">Clear</button>
        </div>
        <form id="filters" class="filters" autocomplete="off">
          <label class="filter-field">
            <span>Search name</span>
            <input
              id="filter-name"
              type="search"
              placeholder="Facility name…"
            />
          </label>
          <label class="filter-field">
            <span>Type</span>
            <select id="filter-type">
              <option value="">All types</option>
            </select>
          </label>
          <label class="filter-field">
            <span>Subtype</span>
            <select id="filter-subtype">
              <option value="">All subtypes</option>
            </select>
          </label>
          <label class="filter-field">
            <span>Assignee</span>
            <select id="filter-assignee">
              <option value="">All assignees</option>
            </select>
          </label>
          <label class="filter-field">
            <span>County</span>
            <select id="filter-county">
              <option value="">All counties</option>
            </select>
          </label>
          <label class="filter-field">
            <span>City</span>
            <select id="filter-city">
              <option value="">All cities</option>
            </select>
          </label>
        </form>
      </section>

      <section class="panel" id="details-panel">
        <h2>Facility details</h2>
        <div id="details">
          <p class="details-empty">Click a facility pin to see details.</p>
        </div>
      </section>

      <section class="panel">
        <h2>Assignee colors</h2>
        <div id="assignee-legend" class="legend-list"></div>
      </section>

      <section class="panel">
        <h2>Subtype shapes</h2>
        <div id="subtype-legend" class="legend-list"></div>
      </section>
    </aside>

    <div id="map" role="application" aria-label="Facilities map"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/map.js"></script>
  </body>
</html>
