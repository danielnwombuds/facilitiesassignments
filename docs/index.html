<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>WA DSHS Facilities Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="css/map.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-title">
        <h1>WA DSHS Facilities Map</h1>
        <p class="site-header-tagline">Pin color = assignee · Pin shape = subtype</p>
      </div>
      <div id="status">Loading…</div>
    </header>

    <section class="filter-bar" id="filter-bar">
      <div class="filter-bar-toolbar">
        <label class="filter-search-wrap">
          <span class="visually-hidden">Search facilities</span>
          <input
            id="filter-search"
            type="search"
            placeholder="Search…"
            autocomplete="off"
          />
        </label>
        <button
          type="button"
          id="toggle-filters"
          class="filter-toggle"
          aria-expanded="false"
          aria-controls="filter-panel"
        >
          <span class="filter-toggle-label">Filters</span>
          <span id="filter-badge" class="filter-badge" hidden>0</span>
        </button>
        <button type="button" id="clear-filters" class="text-button" hidden>
          Clear
        </button>
      </div>
      <div id="filter-panel" class="filter-panel" hidden>
        <form id="filters" class="filters" autocomplete="off">
          <label class="filter-field">
            <span>Type</span>
            <select id="filter-type">
              <option value="">All types</option>
            </select>
          </label>
          <label class="filter-field">
            <span>Subtype</span>
            <select id="filter-subtype">
              <option value="">All subtypes</option>
            </select>
          </label>
          <label class="filter-field">
            <span>Assignee</span>
            <select id="filter-assignee">
              <option value="">All assignees</option>
            </select>
          </label>
          <label class="filter-field">
            <span>County</span>
            <select id="filter-county">
              <option value="">All counties</option>
            </select>
          </label>
          <label class="filter-field">
            <span>City</span>
            <select id="filter-city">
              <option value="">All cities</option>
            </select>
          </label>
        </form>
      </div>
    </section>

    <aside class="sidebar">
      <section class="panel" id="details-panel">
        <h2>Facility details</h2>
        <div id="details">
          <p class="details-empty">Click a facility pin to see details.</p>
        </div>
      </section>

      <section class="panel panel-collapsible" id="legend-assignee-panel">
        <button
          type="button"
          class="panel-toggle"
          aria-expanded="false"
          aria-controls="assignee-legend"
        >
          <h2>Assignee colors</h2>
          <span class="panel-toggle-icon" aria-hidden="true">▾</span>
        </button>
        <div id="assignee-legend" class="legend-list panel-collapsible-body" hidden></div>
      </section>

      <section class="panel panel-collapsible" id="legend-subtype-panel">
        <button
          type="button"
          class="panel-toggle"
          aria-expanded="false"
          aria-controls="subtype-legend"
        >
          <h2>Subtype shapes</h2>
          <span class="panel-toggle-icon" aria-hidden="true">▾</span>
        </button>
        <div id="subtype-legend" class="legend-list panel-collapsible-body" hidden></div>
      </section>
    </aside>

    <div id="map" role="application" aria-label="Facilities map"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/map.js"></script>
  </body>
</html>
